<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{layout :: layout(~{::section})}">
<section>
	<div th:replace="~{fragments/components :: alerts}"></div>

	<div class="panel">
		<div class="panel-header">
			<h2>Datos del segmento</h2>
		</div>
		<div class="panel-body">
			<form th:action="@{/segments}" method="post" class="scraping-form">
				<div class="filter-grid">
					<div class="form-field form-field-wide">
						<label class="form-label" for="name">Nombre</label>
						<input class="form-control" id="name" name="name" type="text" required
							   placeholder="Backend Java MX">
					</div>
					<div class="form-field form-field-wide">
						<label class="form-label" for="description">Descripción</label>
						<textarea class="form-control" id="description" name="description" rows="2"
								  placeholder="Mercado objetivo..."></textarea>
					</div>
				</div>

				<div class="form-section-title">Criterios de scrape por defecto</div>
				<div class="filter-grid">
					<div class="form-field">
						<label class="form-label" for="keywords">Keywords</label>
						<input class="form-control" id="keywords" name="keywords" type="text"
							   placeholder="java spring">
					</div>
					<div class="form-field">
						<label class="form-label" for="location">Ubicación</label>
						<input class="form-control" id="location" name="location" type="text"
							   placeholder="cdmx">
					</div>
					<div class="form-field">
						<label class="form-label" for="salaryMin">Salario mín.</label>
						<input class="form-control" id="salaryMin" name="salaryMin" type="number" step="1000">
					</div>
					<div class="form-field">
						<label class="form-label" for="salaryMax">Salario máx.</label>
						<input class="form-control" id="salaryMax" name="salaryMax" type="number" step="1000">
					</div>
					<div class="form-field">
						<label class="form-label" for="employmentType">Tipo de empleo</label>
						<input class="form-control" id="employmentType" name="employmentType" type="text">
					</div>
					<div class="form-field">
						<label class="form-label" for="workMode">Modalidad</label>
						<select class="form-select" id="workMode" name="workMode"
								th:replace="~{fragments/scraping-forms :: workModeSelect('workMode', 'workMode', null)}"></select>
					</div>
					<div class="form-field">
						<label class="form-label" for="postedWithinDays">Publicados (días)</label>
						<input class="form-control" id="postedWithinDays" name="postedWithinDays" type="number" min="0">
					</div>
				</div>

				<div class="form-footer">
					<a th:href="@{/segments}" class="btn btn-outline-secondary">Cancelar</a>
					<button type="submit" class="btn btn-primary">Crear segmento</button>
				</div>
			</form>
		</div>
	</div>
</section>
</html>
