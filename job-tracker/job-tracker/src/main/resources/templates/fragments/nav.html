<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

		<span class="sidebar-label">Overview</span>

			<i data-lucide="layout-dashboard" aria-hidden="true"></i>
			<span>Dashboard</span>
