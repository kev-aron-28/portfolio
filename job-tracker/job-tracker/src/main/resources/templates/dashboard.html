<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{layout :: layout(~{::section})}">
<section>
	<div th:replace="~{fragments/dashboard-metrics :: panels(${metrics})}"></div>

	<div class="panel">
		<div class="panel-header">
			<h2>Vacantes recientes</h2>
			<a th:href="@{/jobs}" class="btn btn-sm btn-outline-secondary">Ver todas</a>
		</div>
		<div class="panel-body-flush" th:if="${!recentJobs.isEmpty()}">
			<div class="table-responsive">
				<table class="table table-app mb-0">
					<thead>
					<tr>
						<th>Título</th>
						<th>Empresa</th>
						<th>Fuente</th>
						<th>Estado</th>
					</tr>
					</thead>
					<tbody>
					<tr th:each="job : ${recentJobs}">
						<td class="cell-truncate">
							<a th:href="@{/jobs/{id}(id=${job.id()})}" th:text="${job.title()}">Title</a>
						</td>
						<td th:text="${job.companyName()}">Company</td>
						<td><span th:replace="~{fragments/components :: sourceBadge(${job.source()})}"></span></td>
						<td>
							<span th:if="${job.applicationStatus() != null}"
								  th:replace="~{fragments/components :: statusBadge(${job.applicationStatus()})}"></span>
							<span th:if="${job.applicationStatus() == null}"
								  th:replace="~{fragments/components :: newBadge}"></span>
						</td>
					</tr>
					</tbody>
				</table>
			</div>
		</div>
		<div class="empty-state" th:if="${recentJobs.isEmpty()}">
			<i data-lucide="search" aria-hidden="true"></i>
			<div>No hay vacantes. Ejecuta un scrape para comenzar.</div>
			<a th:href="@{/scraping}" class="btn btn-sm btn-primary mt-2">Ir a Scraping</a>
		</div>
	</div>
</section>
</html>
