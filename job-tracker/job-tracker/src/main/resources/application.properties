spring.application.name=job-tracker

spring.datasource.url=jdbc:postgresql://localhost:5432/jobs
spring.datasource.username=admin
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin

scraping.rate-limit-ms=1000
scraping.linkedin.storage-state-path=
scraping.linkedin.page-timeout-ms=30000

automation.scheduling.enabled=true
automation.scheduling.poll-interval-ms=60000
automation.notifications.rabbitmq-enabled=true
automation.notifications.exchange=job-tracker.notifications
automation.notifications.routing-key=job.imports
automation.notifications.queue=job-imports

# OCC scraping debug (set to DEBUG while troubleshooting)
logging.level.com.projects.job_tracker.infrastructure.scraping.occ=DEBUG
