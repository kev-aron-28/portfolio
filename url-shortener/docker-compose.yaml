version: "3.9"

services:
  db:
    image: postgres:15
    container_name: shorten-db
    restart: always
    environment:
      POSTGRES_DB: shortener
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - db_shorten_data:/var/lib/postgresql/data

  cache:
    image: redis:7
    container_name: shorten-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_shorten_data:/data

volumes:
  db_shorten_data:
  redis_shorten_data:
