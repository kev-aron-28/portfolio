<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="bulk-row-tags(rowIndex, selectedTagIds, newTagNamesValue)"
     th:with="selectedTagIds=${selectedTagIds != null ? selectedTagIds : T(java.util.Collections).emptyList()}">
  <div class="mb-2">
    <label class="form-label small mb-1">Tags</label>
    <div class="tag-checkbox-grid" th:if="${!#lists.isEmpty(tags)}">
      <div class="form-check" th:each="tag : ${tags}">
        <input class="form-check-input" type="checkbox"
               th:id="${'row-' + rowIndex + '-tag-' + tag.id()}"
               th:name="${'rows[' + rowIndex + '].tagIds'}"
               th:value="${tag.id()}"
               th:checked="${#lists.contains(selectedTagIds, tag.id())}">
        <label class="form-check-label small"
               th:for="${'row-' + rowIndex + '-tag-' + tag.id()}"
               th:text="${tag.name()}">BFS</label>
      </div>
    </div>
    <p class="text-muted small mb-0" th:if="${#lists.isEmpty(tags)}">No tags yet.</p>
  </div>
  <div>
    <label class="form-label small mb-1" th:for="${'row-' + rowIndex + '-newTagNames'}">Create new tags</label>
    <input type="text" class="form-control form-control-sm"
           th:id="${'row-' + rowIndex + '-newTagNames'}"
           th:name="${'rows[' + rowIndex + '].newTagNames'}"
           th:value="${newTagNamesValue}"
           placeholder="e.g. Two Pointers, DP">
    <div class="form-text">Comma-separated. New tags are created automatically.</div>
  </div>
</div>
</body>
</html>
