<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(~{::content})}">
<body>
<div th:fragment="content">
  <div class="page-header">
    <div>
      <h1 class="page-title" th:text="${pageTitle}">Tag Form</h1>
      <p class="page-subtitle">Name an algorithm pattern or technique.</p>
    </div>
    <a class="btn btn-outline-secondary" th:href="@{/tags}">
      <i class="bi bi-arrow-left me-1"></i>Back
    </a>
  </div>

  <div class="card-surface p-4" style="max-width: 480px;">
    <form th:action="${formAction}" th:object="${tagForm}" method="post" novalidate>
      <div class="mb-4">
        <label for="name" class="form-label">Name</label>
        <input type="text" id="name" class="form-control"
               th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
               th:field="*{name}" placeholder="e.g. Binary Search" required>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save tag</button>
        <a class="btn btn-outline-secondary" th:href="@{/tags}">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
