spring.application.name=knowledge-manager

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/knowledge_manager
spring.datasource.username=knowledge_manager
spring.datasource.password=knowledge_manager

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Review scheduler: sm2 | fixed-interval
app.review.scheduler=sm2

# New problems: first review is spread across days instead of all at once
app.review.new-problem.grace-days=1
app.review.new-problem.spread-days=30
app.review.upcoming-window-days=7
# Daily study queue size — overdue backlog beyond this stays deferred
app.review.dashboard.due-today-limit=10
app.review.dashboard.upcoming-limit=20
app.review.dashboard.new-queue-limit=10
app.review.time-zone=America/Mexico_City

# Problems list pagination
app.problems.page-size=24
