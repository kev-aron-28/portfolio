spring.datasource.url=jdbc:h2:mem:knowledge_manager;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

app.review.new-problem.grace-days=1
app.review.new-problem.spread-days=30
app.review.time-zone=UTC

app.problems.page-size=3
