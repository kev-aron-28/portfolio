services:
  postgres:
    image: postgres:16-alpine
    container_name: knowledge-manager-db
    environment:
      POSTGRES_DB: knowledge_manager
      POSTGRES_USER: knowledge_manager
      POSTGRES_PASSWORD: knowledge_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
